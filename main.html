<!DOCTYPE html>
<html>
<head>
    <title>Form</title>
</head>
<body>

<form method="post">

    <label for="name">Name</label>
    <input type="text" id="name" placeholder="Name" required><br>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Email" required><br>

    <label>Gender</label>
    <input type="radio" name="gender" id="gender_m" required>
    <label for="gender_m">Male</label>

    <input type="radio" name="gender" id="gender_f" required>
    <label for="gender_f">Female</label><br>

    <label for="cars">Car Brands</label>
    <select id="cars" name="cars" required>
        <option>--Please choose an option--</option>
        <option>Toyota</option>
        <option>BMW</option>
        <option>Audi</option>
    </select><br>

    <label for="age">Age</label>
    <input type="number" id="age" placeholder="Age" required><br>

    <label for="dob">DOB</label>
    <input type="date" id="dob" required><br>

    <label for="tel">Phone Number</label>
    <input type="tel" id="tel" placeholder="xxx-xxx-xxxx"><br>

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Password" required><br>

    <label for="tos">
        <input type="checkbox" id="tos" name="tos" required>
        I agree to the TOS
    </label><br>

    <button type="submit">Submit</button>

</form>

</body>
</html>

</html>
